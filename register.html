<!DOCTYPE html>
<html lang="es">

<head>
<meta charset="UTF-8">
<title>Registro</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="stylesheet" href="style.css?v=2">
</head>

<body class="auth-page">

<main class="app">
<header class="hero">
<span class="badge">Comunidad Texca</span>
<h1>Crea tu cuenta en minutos</h1>
<p>Registra tus datos y comienza a administrar pagos y productos.</p>
<div class="pill-row">
<span>Seguro</span>
<span>Rapido</span>
<span>Centralizado</span>
</div>
</header>

<section class="card">
<h2>Registro</h2>

<form id="registerForm" class="stack">
<div class="field">
<label for="name">Nombre completo</label>
<input id="name" placeholder="Nombre y apellido" required>
</div>

<div class="field">
<label for="phone">Telefono</label>
<input id="phone" placeholder="Tu telefono" required>
</div>

<div class="field">
<label for="email">Correo</label>
<input id="email" type="email" placeholder="tu@correo.com" required>
</div>

<div class="field">
<label for="password">Contrasena</label>
<input id="password" type="password" placeholder="Crea una contrasena" required>
</div>

<button class="primary">Crear cuenta</button>
</form>

<p class="helper">Ya tienes cuenta? <a href="login.html">Iniciar sesion</a></p>
<p id="message" class="status"></p>
</section>
</main>

<script type="module" src="auth.js?v=7"></script>

</body>
</html>
